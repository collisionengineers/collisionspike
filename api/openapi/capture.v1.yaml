openapi: 3.1.0
info:
  title: CollisionSpike guided capture API
  version: 1.0.0
  description: >-
    Canonical staff and public HTTP contract for case-scoped guided vehicle
    evidence capture. Public responses never expose an internal case identifier
    or an evidence identifier.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /
    description: Current CollisionSpike host
tags:
  - name: Capture sessions (staff)
    description: Staff-authenticated capture-session lifecycle operations.
  - name: Public capture
    description: Session-scoped operations used by the public capture PWA.

paths:
  /api/cases/{caseId}/capture-sessions:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    post:
      operationId: createCaptureSession
      summary: Create a capture session for an existing case
      tags: [Capture sessions (staff)]
      security:
        - StaffBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaptureSessionRequest'
      responses:
        '201':
          description: Session created and a one-time bootstrap URL returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureSessionSecretResponse'
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '503':
          $ref: '#/components/responses/Problem'
    get:
      operationId: listCaptureSessions
      summary: List capture sessions for a case
      tags: [Capture sessions (staff)]
      security:
        - StaffBearer: []
      responses:
        '200':
          description: Capture sessions, excluding bootstrap secrets and URLs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureSessionListResponse'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'

  /api/capture-sessions/{sessionId}/rotate:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      operationId: rotateCaptureSession
      summary: Rotate a session bootstrap secret
      description: Invalidates the previous bootstrap secret and returns one replacement URL.
      tags: [Capture sessions (staff)]
      security:
        - StaffBearer: []
      responses:
        '200':
          description: Secret rotated and a one-time replacement URL returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureSessionSecretResponse'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '503':
          $ref: '#/components/responses/Problem'

  /api/capture-sessions/{sessionId}/revoke:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      operationId: revokeCaptureSession
      summary: Revoke a capture session
      tags: [Capture sessions (staff)]
      security:
        - StaffBearer: []
      responses:
        '200':
          description: Session revoked or already revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureSessionStaffSummary'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'

  /api/public/capture/exchange:
    post:
      operationId: exchangeCaptureBootstrap
      summary: Exchange a bootstrap secret for short-lived session access
      tags: [Public capture]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureExchangeRequest'
      responses:
        '200':
          description: Bootstrap secret accepted.
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureExchangeResponse'
        '400':
          $ref: '#/components/responses/PublicProblem'
        '401':
          $ref: '#/components/responses/PublicProblem'
        '410':
          $ref: '#/components/responses/PublicProblem'
        '429':
          $ref: '#/components/responses/PublicProblem'
        '503':
          $ref: '#/components/responses/PublicProblem'

  /api/public/capture/sessions/{sessionId}:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      operationId: getPublicCaptureSession
      summary: Get the safe public capture manifest and progress
      tags: [Public capture]
      security:
        - CaptureBearer: []
      responses:
        '200':
          description: Public session manifest.
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureSessionManifest'
        '401':
          $ref: '#/components/responses/PublicProblem'
        '404':
          $ref: '#/components/responses/PublicProblem'
        '410':
          $ref: '#/components/responses/PublicProblem'
        '429':
          $ref: '#/components/responses/PublicProblem'
        '503':
          $ref: '#/components/responses/PublicProblem'

  /api/public/capture/sessions/{sessionId}/uploads:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      operationId: createCaptureUpload
      summary: Reserve an exact upload object for one shot attempt
      tags: [Public capture]
      security:
        - CaptureBearer: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureUploadRequest'
      responses:
        '201':
          description: Exact-object upload permission created.
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureUploadIntent'
        '400':
          $ref: '#/components/responses/PublicProblem'
        '401':
          $ref: '#/components/responses/PublicProblem'
        '404':
          $ref: '#/components/responses/PublicProblem'
        '409':
          $ref: '#/components/responses/PublicProblem'
        '410':
          $ref: '#/components/responses/PublicProblem'
        '413':
          $ref: '#/components/responses/PublicProblem'
        '415':
          $ref: '#/components/responses/PublicProblem'
        '429':
          $ref: '#/components/responses/PublicProblem'
        '503':
          $ref: '#/components/responses/PublicProblem'

  /api/public/capture/sessions/{sessionId}/uploads/{assetId}/complete:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/AssetId'
    post:
      operationId: completeCaptureUpload
      summary: Verify and complete an uploaded shot attempt
      tags: [Public capture]
      security:
        - CaptureBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureUploadCompleteRequest'
      responses:
        '200':
          description: Upload accepted for validation or review.
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureUploadCompleteResponse'
        '400':
          $ref: '#/components/responses/PublicProblem'
        '401':
          $ref: '#/components/responses/PublicProblem'
        '404':
          $ref: '#/components/responses/PublicProblem'
        '409':
          $ref: '#/components/responses/PublicProblem'
        '410':
          $ref: '#/components/responses/PublicProblem'
        '422':
          $ref: '#/components/responses/PublicProblem'
        '429':
          $ref: '#/components/responses/PublicProblem'
        '503':
          $ref: '#/components/responses/PublicProblem'

  /api/public/capture/sessions/{sessionId}/submit:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      operationId: submitCaptureSession
      summary: Submit all selected capture assets to the case
      tags: [Public capture]
      security:
        - CaptureBearer: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Session submission completed or replayed successfully.
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureSubmitResponse'
        '400':
          $ref: '#/components/responses/PublicProblem'
        '401':
          $ref: '#/components/responses/PublicProblem'
        '404':
          $ref: '#/components/responses/PublicProblem'
        '409':
          $ref: '#/components/responses/PublicProblem'
        '410':
          $ref: '#/components/responses/PublicProblem'
        '422':
          $ref: '#/components/responses/PublicProblem'
        '429':
          $ref: '#/components/responses/PublicProblem'
        '503':
          $ref: '#/components/responses/PublicProblem'

components:
  securitySchemes:
    StaffBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: CollisionSpike staff Entra access token with an accepted app role.
    CaptureBearer:
      type: http
      scheme: bearer
      bearerFormat: Opaque
      description: Short-lived access token scoped to exactly one capture session.

  parameters:
    CaseId:
      name: caseId
      in: path
      required: true
      description: Internal case identifier. This parameter exists only on staff routes.
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssetId:
      name: assetId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Stable opaque key for this logical attempt. Reuse with different input is a conflict.
      schema:
        type: string
        minLength: 16
        maxLength: 128
        pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{15,127}$'

  headers:
    NoStore:
      description: Public capture responses must not be stored by browsers or intermediaries.
      schema:
        type: string
        const: no-store

  responses:
    Problem:
      description: Request refused.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CaptureApiProblem'
    PublicProblem:
      description: Public capture request refused without exposing sensitive context.
      headers:
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CaptureApiProblem'

  schemas:
    CaptureSessionStatus:
      type: string
      enum: [open, complete, expired, revoked, locked]

    GuidanceMode:
      type: string
      enum: [off, shadow, advisory, enforced]

    CreateCaptureSessionRequest:
      type: object
      additionalProperties: false
      required: [shotPlanId, expiresInHours]
      properties:
        shotPlanId:
          $ref: '#/components/schemas/CaptureShotPlanId'
        expiresInHours:
          type: integer
          enum: [24, 72, 168]
          default: 72

    CaptureShotPlanId:
      type: string
      enum: [essential-v1, standard-exterior-v1]
      default: essential-v1

    CaptureSessionStaffSummary:
      type: object
      additionalProperties: false
      required:
        - sessionId
        - status
        - shotPlanId
        - shotPlanLabel
        - guidanceMode
        - expiresAt
        - createdAt
        - requiredTotal
        - requiredCompleted
      properties:
        sessionId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/CaptureSessionStatus'
        shotPlanId:
          $ref: '#/components/schemas/CaptureShotPlanId'
        shotPlanLabel:
          type: string
        guidanceMode:
          $ref: '#/components/schemas/GuidanceMode'
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        submittedAt:
          type: string
          format: date-time
        requiredTotal:
          type: integer
          minimum: 0
        requiredCompleted:
          type: integer
          minimum: 0

    CaptureSessionSecretResponse:
      type: object
      additionalProperties: false
      required: [session, captureUrl]
      properties:
        session:
          $ref: '#/components/schemas/CaptureSessionStaffSummary'
        captureUrl:
          type: string
          format: uri
          description: One-time staff response containing the bootstrap secret in the URL fragment.

    CaptureSessionListResponse:
      type: object
      additionalProperties: false
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/CaptureSessionStaffSummary'

    CaptureExchangeRequest:
      type: object
      additionalProperties: false
      required: [bootstrapSecret]
      properties:
        bootstrapSecret:
          type: string
          minLength: 43
          maxLength: 128
          pattern: '^[A-Za-z0-9_-]{43,128}$'

    CaptureExchangeResponse:
      type: object
      additionalProperties: false
      required: [sessionId, accessToken, accessTokenExpiresAt]
      properties:
        sessionId:
          type: string
          format: uuid
        accessToken:
          type: string
          minLength: 32
        accessTokenExpiresAt:
          type: string
          format: date-time

    ShotRole:
      type: string
      enum:
        - overview
        - damage_closeup
        - damage_context
        - front_left
        - front_right
        - rear_left
        - rear_right
        - vin
        - odometer
        - additional

    EvidenceImageRole:
      type: string
      enum: [overview, damage_closeup, additional, unknown]

    CaptureShotDefinition:
      type: object
      additionalProperties: false
      required: [id, role, evidenceRole, label, prompt, required, sequence]
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 80
          pattern: '^[a-z0-9][a-z0-9._-]{0,79}$'
        role:
          $ref: '#/components/schemas/ShotRole'
        evidenceRole:
          $ref: '#/components/schemas/EvidenceImageRole'
        label:
          type: string
          minLength: 1
          maxLength: 120
        prompt:
          type: string
          minLength: 1
          maxLength: 400
        required:
          type: boolean
        sequence:
          type: integer
          minimum: 0
        guidanceProfile:
          type: string
          maxLength: 80

    CaptureShotProgressStatus:
      type: string
      enum:
        - empty
        - draft
        - queued
        - uploading
        - validating
        - accepted
        - pending_review
        - retryable
        - rejected

    CaptureShotProgress:
      type: object
      additionalProperties: false
      required: [shotId, status]
      properties:
        shotId:
          type: string
        status:
          $ref: '#/components/schemas/CaptureShotProgressStatus'
        assetId:
          type: string
          format: uuid
        rejectionReason:
          type: string
          maxLength: 200

    CaptureSessionManifest:
      type: object
      additionalProperties: false
      required:
        - contractVersion
        - sessionId
        - status
        - expiresAt
        - maxFileBytes
        - acceptedMimeTypes
        - guidanceMode
        - rulesVersion
        - shots
        - progress
      properties:
        contractVersion:
          type: string
          const: '1'
        sessionId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/CaptureSessionStatus'
        caseReference:
          type: string
          maxLength: 80
        registration:
          type: string
          maxLength: 20
        vehicleLabel:
          type: string
          maxLength: 160
        expiresAt:
          type: string
          format: date-time
        maxFileBytes:
          type: integer
          minimum: 1
        acceptedMimeTypes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
        guidanceMode:
          $ref: '#/components/schemas/GuidanceMode'
        rulesVersion:
          type: string
        modelVersion:
          type: string
        shots:
          type: array
          items:
            $ref: '#/components/schemas/CaptureShotDefinition'
        progress:
          type: array
          items:
            $ref: '#/components/schemas/CaptureShotProgress'

    CaptureUploadRequest:
      type: object
      additionalProperties: false
      required: [shotId, fileName, contentType, sizeBytes, sha256]
      properties:
        shotId:
          type: string
          minLength: 1
          maxLength: 80
        fileName:
          type: string
          minLength: 1
          maxLength: 255
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/webp]
        sizeBytes:
          type: integer
          minimum: 1
        sha256:
          type: string
          pattern: '^[0-9a-f]{64}$'

    CaptureUploadIntent:
      type: object
      additionalProperties: false
      required: [uploadId, assetId, method, uploadUrl, headers, expiresAt]
      properties:
        uploadId:
          type: string
          format: uuid
        assetId:
          type: string
          format: uuid
        method:
          type: string
          const: direct
        uploadUrl:
          type: string
          format: uri
        headers:
          type: object
          description: Exact headers the browser must send to Blob storage.
          additionalProperties:
            type: string
        expiresAt:
          type: string
          format: date-time

    CaptureUploadCompleteRequest:
      type: object
      additionalProperties: false
      required: [sizeBytes, sha256]
      properties:
        sizeBytes:
          type: integer
          minimum: 1
        sha256:
          type: string
          pattern: '^[0-9a-f]{64}$'

    CaptureUploadCompleteResponse:
      type: object
      additionalProperties: false
      required: [assetId, shotId, status]
      properties:
        assetId:
          type: string
          format: uuid
        shotId:
          type: string
        status:
          type: string
          enum: [validating, accepted, pending_review]

    CaptureSubmitResponse:
      type: object
      additionalProperties: false
      required: [status, completedAt]
      properties:
        status:
          type: string
          const: complete
        completedAt:
          type: string
          format: date-time

    CaptureApiProblemCode:
      type: string
      enum:
        - capture_disabled
        - invalid_request
        - unauthorized
        - forbidden
        - not_found
        - expired
        - revoked
        - locked
        - unsupported
        - payload_too_large
        - validation_failed
        - conflict
        - rate_limited
        - retryable
        - internal

    CaptureApiProblem:
      type: object
      additionalProperties: false
      required: [error, message]
      properties:
        error:
          $ref: '#/components/schemas/CaptureApiProblemCode'
        message:
          type: string
          minLength: 1
          maxLength: 200
