<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Collision Engineers — Documents & Reports</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="doc.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="letterhead.jsx"></script>
  <script type="text/babel" src="documents.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    const DOCS = [
      ["report", "Total Loss Report", TotalLossReport],
      ["valuation", "Market Valuation Evidence", ValuationEvidence],
      ["rebuttal", "Diminution Rebuttal", DiminutionRebuttal],
      ["letter", "Response Letter", ResponseLetter],
      ["feenote", "Fee Note", FeeNote],
    ];
    function App() {
      const [doc, setDoc] = useState("report");
      const Active = DOCS.find(d => d[0] === doc)[2];
      return (
        <React.Fragment>
          <div className="doc-toolbar">
            <span className="ttl">Documents &amp; Reports</span>
            {DOCS.map(([id, label]) => (
              <button key={id} className="doc-tab" aria-current={doc === id ? "page" : undefined} onClick={() => setDoc(id)}>{label}</button>
            ))}
            <span className="spacer"></span>
            <span className="doc-hint">A4 letterhead template · print-ready</span>
          </div>
          <div className="doc-scroll"><Active /></div>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
