<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .form { display:grid; gap:14px; max-width:560px; }
  .lab { display:block; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--web-fg); margin-bottom:6px; }
  .inp { width:100%; padding:12px 16px; font-size:14px; border:1px solid var(--web-border); border-radius:2px; background:#fff; font-family:var(--font-web); }
  .inp:focus { outline:none; border-color:#9aa0a6; box-shadow:0 0 0 1px #9aa0a6; }
  .two { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
</style></head>
<body>
  <div class="form">
    <div class="cap">Form fields — contact / enquiry</div>
    <div class="two">
      <div><span class="lab">Name *</span><input class="inp" value="A. Solicitor"></div>
      <div><span class="lab">Phone</span><input class="inp" placeholder="Phone number"></div>
    </div>
    <div><span class="lab">Email *</span><input class="inp" value="enquiries@chambers.co.uk" style="border-color:#9aa0a6;box-shadow:0 0 0 1px #9aa0a6;"></div>
  </div>
</body></html>
