<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .sp { display:flex; align-items:center; gap:12px; }
  .sp .bar { height:16px; background:var(--ce-red); border-radius:2px; }
  .sp .n { width:120px; }
</style></head>
<body>
  <div class="col">
    <div class="cap">Spacing scale — 4px base</div>
    <div class="col" style="gap:7px;">
      <div class="sp"><span class="n mono">4 · sp-1</span><div class="bar" style="width:4px"></div></div>
      <div class="sp"><span class="n mono">8 · sp-2</span><div class="bar" style="width:8px"></div></div>
      <div class="sp"><span class="n mono">12 · sp-3</span><div class="bar" style="width:12px"></div></div>
      <div class="sp"><span class="n mono">14 · sp-4</span><div class="bar" style="width:14px"></div></div>
      <div class="sp"><span class="n mono">24 · sp-6</span><div class="bar" style="width:24px"></div></div>
      <div class="sp"><span class="n mono">40 · sp-10</span><div class="bar" style="width:40px"></div></div>
      <div class="sp"><span class="n mono">64 · sp-16 (section)</span><div class="bar" style="width:64px"></div></div>
    </div>
  </div>
</body></html>
