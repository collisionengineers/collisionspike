name: docs

# Documentation-freshness CI for collisionspike.
#
#   doc-links   — runs on every PR + push. NO secrets / NO Azure login needed.
#                 Fails the build on broken relative links, orphaned docs, or
#                 live-number leakage (see scripts/check-doc-links.mjs), and
#                 validates the self-contained parser vendor lock.
#
#   parser-vendor-source — on pushes and same-repository PRs, uses a dedicated
#                 READ-ONLY deploy key for the private cedocumentmapper sibling.
#                 Proves the annotated tag/SHA, source boundary in both directions,
#                 provider seed, and every vendored file. Fork PRs still receive the
#                 offline lock check above; they never receive the deploy key.
#
#   verify-live — re-queries the live Azure/Graph control plane and diffs reality
#                 against LIVE_FACTS.json. Requires an Azure login, so it is GATED on
#                 a repo secret being present and is OPT-IN per the verify-all gate
#                 (VERIFY_LIVE=1). It runs only when the `AZURE_CREDENTIALS` secret
#                 exists.  ⚠ OPERATOR ACTION REQUIRED: configuring the Azure
#                 service-principal / OIDC federation + the AZURE_CREDENTIALS secret is
#                 a one-time operator task (see docs/MAINTENANCE.md). Until then this
#                 job is skipped and the doc-links job runs on its own.

on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  doc-links:
    name: doc-links (no secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify immutable parser vendor pin
        run: python functions/parser/scripts/verify_vendor_pin.py
      - name: Check doc links, orphans, and live-fact leakage
        run: node scripts/check-doc-links.mjs
      - name: Check ticket system
        run: node scripts/check-tickets.mjs
      - name: Check shared skill sync
        run: node scripts/check-skills-sync.mjs
      - name: Install Node dependencies
        run: npm ci && npm install --no-save @rollup/rollup-linux-x64-gnu@4.62.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Provision Python virtualenvs for retained functions
        # verify-offline.mjs runs each function's pytest ONLY when a
        # <dir>/.venv/bin/python interpreter exists (it otherwise SKIPs). The CI
        # runner has no worktree-provisioned venv, so create one per function and
        # install its locked requirements here — this is what makes acceptance A6
        # ("relevant Python suites without skipping") actually hold in CI. A
        # missing requirements.txt is a deliberate skip; a real pip failure fails
        # the job (no continue-on-error).
        run: |
          set -e
          for d in functions/parser functions/enrichment functions/evasentry functions/evavalidation functions/location-suggest functions/box-webhook ocr; do
            if [ -f "$d/requirements.txt" ]; then
              echo "provision venv: $d"
              python -m venv "$d/.venv"
              "$d/.venv/bin/python" -m pip install -r "$d/requirements.txt"
              if [ -f "$d/requirements-dev.txt" ]; then
                "$d/.venv/bin/python" -m pip install -r "$d/requirements-dev.txt"
              fi
            else
              echo "skip: no requirements ($d)"
            fi
          done
      - name: Run complete offline verification
        run: npm run verify:offline

  parser-vendor-source:
    name: parser-vendor-source (immutable private tag)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Actions secrets are not exposed to fork PRs. Never use pull_request_target
    # here: this job executes the branch's verifier code.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - name: Check out the read-only parser source
        uses: actions/checkout@v4
        with:
          repository: collisionengineers/cedocumentmapper_v2.0
          path: .ci/cedocumentmapper_v2.0
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
          ssh-key: ${{ secrets.CEDOCUMENTMAPPER_DEPLOY_KEY }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify immutable tag, source boundary, and vendored content
        run: python functions/parser/scripts/verify_vendor_pin.py
        env:
          CEDOCUMENTMAPPER_REPO: ${{ github.workspace }}/.ci/cedocumentmapper_v2.0

  verify-live:
    name: verify-live (gated on Azure secret)
    runs-on: ubuntu-latest
    # Only run when the operator has configured Azure credentials as a repo secret.
    # `secrets` cannot be referenced in a job-level `if:`, so surface it via an env var.
    needs: doc-links
    env:
      HAVE_AZURE: ${{ secrets.AZURE_CREDENTIALS != '' }}
    if: ${{ needs.doc-links.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip notice
        if: env.HAVE_AZURE != 'true'
        run: |
          echo "AZURE_CREDENTIALS secret not set — skipping live registry-drift verification."
          echo "OPERATOR ACTION: configure an Azure service principal / OIDC and add the"
          echo "AZURE_CREDENTIALS secret to enable this job (see docs/MAINTENANCE.md)."
      - uses: actions/setup-node@v4
        if: env.HAVE_AZURE == 'true'
        with:
          node-version: "20"
      - name: Install dependencies
        # verify-all.mjs runs the offline build/test gates (mockup-app build, api build +
        # vitest, @cs/domain vitest) BEFORE the live drift check, so deps must be installed
        # or the job fails on the first gate before ever reaching verify-live.
        if: env.HAVE_AZURE == 'true'
        run: npm ci
      - name: Azure login
        if: env.HAVE_AZURE == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Verify LIVE_FACTS.json against live Azure/Graph
        if: env.HAVE_AZURE == 'true'
        run: VERIFY_LIVE=1 node verify-all.mjs
