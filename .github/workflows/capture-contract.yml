name: capture-contract

on:
  pull_request:
    paths:
      - contracts/capture.v1.yaml
      - services/data-api/src/**
      - database/baseline/**
      - database/migrations/**
      - services/data-api/package.json
      - services/data-api/tsconfig.json
      - packages/capture-contracts/**
      - apps/capture-web/**
      - package.json
      - package-lock.json
      - scripts/checks/check-capture-contract.mjs
      - .github/workflows/capture-contract.yml
  push:
    branches: [main]
    paths:
      - contracts/capture.v1.yaml
      - services/data-api/src/**
      - database/baseline/**
      - database/migrations/**
      - services/data-api/package.json
      - services/data-api/tsconfig.json
      - packages/capture-contracts/**
      - apps/capture-web/**
      - package.json
      - package-lock.json
      - scripts/checks/check-capture-contract.mjs
      - .github/workflows/capture-contract.yml

permissions:
  contents: read

jobs:
  verify:
    name: validate, generate, and build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate the canonical contract and generated types (server + browser)
        run: npm run contract:capture:check
      - name: Build the Data API
        run: npm run build:api
      - name: Test the Data API
        run: npm run test --workspace @cs/api
      - name: Build the capture browser contract + app
        run: npm run build:capture-contracts && npm run build:capture-web
      - name: Test the capture browser app
        run: npm run test --workspace @cs/capture-web
