name: Reciprocal AI review markers

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, edited]
  push:
    branches: [main]
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review:
    types: [submitted, edited, dismissed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to evaluate
        required: true
        type: string

# SECURITY: this workflow never checks out or executes pull-request code or an
# AI model. It reads the evaluator from the PR's trusted base commit, reads PR
# comments, and writes a commit status to the exact current head SHA.
#
# Private repositories on GitHub Free cannot make this status a required check
# today. The repository's local merge guard remains the interim enforcement.
permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

concurrency:
  group: reciprocal-ai-review-markers-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number || github.sha }}
  cancel-in-progress: true

jobs:
  evaluate:
    if: >-
      (github.event_name != 'issue_comment' || github.event.issue.pull_request) &&
      (github.event_name != 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate exact-head review markers
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const eventName = context.eventName;
            let prNumbers;
            if (eventName === "push") {
              const base = String(context.ref || "").replace(/^refs\/heads\//, "");
              const pulls = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "open",
                base,
                per_page: 100,
              });
              prNumbers = pulls.map((pull) => Number(pull.number));
            } else {
              const prNumber = eventName === "workflow_dispatch"
                ? Number(context.payload.inputs?.pr_number)
                : eventName === "issue_comment"
                  ? Number(context.payload.issue?.number)
                  : Number(context.payload.pull_request?.number);
              prNumbers = [prNumber];
            }

            if (!prNumbers.length) {
              core.info("No open pull requests target the updated base branch.");
              return;
            }

            for (const prNumber of prNumbers) {
              if (!Number.isSafeInteger(prNumber) || prNumber <= 0) {
                core.setFailed("Unable to resolve a valid pull request number.");
                return;
              }
              const { data: pull } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              const headSha = pull.head.sha;
              const baseSha = pull.base.sha;
              const statusContext = "reciprocal-pr-review/head";
              const writeStatus = (state, description) => github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha: headSha,
                state,
                context: statusContext,
                description: String(description).slice(0, 140),
                target_url: pull.html_url,
              });

              // Publish pending before loading comments so every recalculation is
              // visibly attached to the exact head commit under evaluation.
              await writeStatus("pending", "Checking Claude and Codex review markers");

              try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              });

              // Load only the evaluator committed on the PR's base. Never read
              // or execute the head branch, even for pull_request_target events.
              const { data: evaluatorFile } = await github.rest.repos.getContent({
                owner,
                repo,
                path: ".github/scripts/review-marker-status.mjs",
                ref: baseSha,
              });
              if (Array.isArray(evaluatorFile) || evaluatorFile.type !== "file" || evaluatorFile.encoding !== "base64") {
                throw new Error("Trusted base evaluator is not a base64 file.");
              }
              const evaluatorSource = Buffer.from(evaluatorFile.content, "base64").toString("utf8");
              const evaluatorUrl = `data:text/javascript;base64,${Buffer.from(evaluatorSource).toString("base64")}`;
              const { evaluateReviewMarkers } = await import(evaluatorUrl);
              const result = evaluateReviewMarkers({ comments, headSha, baseSha });

                await writeStatus(result.state, result.description);
                if (!result.ok) core.setFailed(`PR #${prNumber}: ${result.description}`);
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error);
                await writeStatus("failure", `Review marker check failed: ${message}`);
                core.setFailed(`PR #${prNumber}: ${message}`);
              }
            }
