name: repository-ci

on:
  pull_request:
  push:
    branches: ["**"]

permissions:
  contents: read

jobs:
  changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
      capture: ${{ steps.detect.outputs.capture }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so base/before commits are available for the diff.
          fetch-depth: 0
      - id: detect
        name: Classify changed files as code or docs-only
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -uo pipefail
          # Fail safe: run the full heavy suite unless we can PROVE that every
          # changed file is documentation (markdown anywhere) or under docs/.
          run_heavy=true
          # Fail safe: run the (expensive, browser-installing) capture e2e suite
          # unless we can PROVE no changed file touches the capture-web app or its
          # own workspace packages.
          capture=true
          files=""
          have_diff=0
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if git rev-parse --verify --quiet "${PR_BASE_SHA}^{commit}" >/dev/null 2>&1; then
              files="$(git diff --name-only "${PR_BASE_SHA}...${PR_HEAD_SHA}")"
              have_diff=1
            fi
          elif [ "$EVENT_NAME" = "push" ]; then
            if [ -n "${PUSH_BEFORE:-}" ] \
               && [ "$PUSH_BEFORE" != "0000000000000000000000000000000000000000" ] \
               && git rev-parse --verify --quiet "${PUSH_BEFORE}^{commit}" >/dev/null 2>&1; then
              files="$(git diff --name-only "$PUSH_BEFORE" "$PUSH_AFTER")"
              have_diff=1
            fi
          fi

          if [ "$have_diff" = "1" ]; then
            # docs-only == NO changed file falls outside the documentation
            # allowlist (*.md anywhere, or anything under docs/).
            if printf '%s\n' "$files" | grep -vE '(\.md$|^docs/)' | grep -q '[^[:space:]]'; then
              run_heavy=true
            else
              run_heavy=false
            fi
            if printf '%s\n' "$files" | grep -qE '^(apps/capture-web/|packages/capture-core/|packages/capture-contracts/|packages/capture-testkit/)'; then
              capture=true
            else
              capture=false
            fi
          fi

          echo "code=${run_heavy}" >> "$GITHUB_OUTPUT"
          echo "capture=${capture}" >> "$GITHUB_OUTPUT"
          echo "event=${EVENT_NAME} have_diff=${have_diff} run_heavy=${run_heavy} capture=${capture}"
          echo "changed files:"
          printf '%s\n' "$files"

  typescript:
    name: TypeScript build, test, and package
    runs-on: ubuntu-latest
    needs: [changes]
    # Always run so the required context reports a real success; run even if the
    # detector failed (fail-safe toward running the heavy suite).
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: ${{ needs.changes.outputs.code != 'false' }}
        with:
          node-version: "20"
          cache: npm
      - if: ${{ needs.changes.outputs.code != 'false' }}
        run: npm ci
      - if: ${{ needs.changes.outputs.code != 'false' }}
        run: npm run build
      - if: ${{ needs.changes.outputs.code != 'false' }}
        run: npm test
      - if: ${{ needs.changes.outputs.code != 'false' }}
        run: npm run package:deploy
      - name: Smoke-load generated function bundles
        if: ${{ needs.changes.outputs.code != 'false' }}
        run: |
          node -e "require('./.artifacts/deploy/data-api/main.cjs')"
          node -e "require('./.artifacts/deploy/orchestration/main.cjs')"
      - name: Docs-only skip notice
        if: ${{ needs.changes.outputs.code == 'false' }}
        run: echo "Docs/data-only change; skipping TypeScript build, test, and package."

  capture-e2e:
    name: Capture web e2e (Playwright)
    runs-on: ubuntu-latest
    needs: [changes]
    # Fail-safe toward running (see the changes job): only skipped when we can
    # prove no changed file touches capture-web or its own workspace packages.
    # Genuinely new CI cost (browser install) scoped to this path specifically,
    # not gated behind the broader code/docs-only split alone.
    if: ${{ !cancelled() && needs.changes.outputs.capture != 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Run capture-web e2e suite
        run: npm run test:e2e --workspace @cs/capture-web

  python:
    name: Python ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [changes]
    # MUST stay job-level unconditional (only !cancelled) so the matrix expands
    # and every 'Python <service>' required leg is created and reports success.
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - box-webhook
          - eva-sentry
          - location-assist
          - ocr
          - parser
          - vehicle-enrichment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: ${{ needs.changes.outputs.code != 'false' }}
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/functions/${{ matrix.service }}/requirements*.txt
      - name: Install service dependencies
        if: ${{ needs.changes.outputs.code != 'false' }}
        working-directory: services/functions/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
      - name: Run service tests
        if: ${{ needs.changes.outputs.code != 'false' }}
        working-directory: services/functions/${{ matrix.service }}
        run: |
          test -d tests || { echo "Required test suite is missing" >&2; exit 1; }
          python -m pytest tests -q
      - name: Run email evaluation checks
        if: ${{ needs.changes.outputs.code != 'false' && matrix.service == 'parser' }}
        run: |
          python -m pytest scripts/evaluation/email/tests -q
          python scripts/evaluation/email/run_ab.py --limit 1
      - name: Docs-only skip notice
        if: ${{ needs.changes.outputs.code == 'false' }}
        run: echo "Docs/data-only change; skipping Python ${{ matrix.service }} tests."

  engine:
    name: Parser engine (services/engine/cedocumentmapper_v2)
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: ${{ needs.changes.outputs.code != 'false' }}
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/engine/cedocumentmapper_v2/pyproject.toml
      - name: Install engine dependencies
        if: ${{ needs.changes.outputs.code != 'false' }}
        working-directory: services/engine/cedocumentmapper_v2
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run engine tests (includes the eval regression gate)
        if: ${{ needs.changes.outputs.code != 'false' }}
        working-directory: services/engine/cedocumentmapper_v2
        run: python -m pytest tests -q
      - name: Verify materialized copies match the canonical source
        if: ${{ needs.changes.outputs.code != 'false' }}
        run: python scripts/checks/check-engine-materialized.py
      - name: Docs-only skip notice
        if: ${{ needs.changes.outputs.code == 'false' }}
        run: echo "Docs/data-only change; skipping engine tests."

  hygiene:
    name: Repository contracts and hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Reconciliation rebuilds its immutable baseline from the permanent pre-reset commit.
          # Full history keeps that commit available after merge, squash, rebase, or branch deletion.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - name: Install document-scanner dependencies
        run: python -m pip install -r scripts/checks/requirements.txt
      - name: Verify engine materialized copies
        run: python scripts/checks/check-engine-materialized.py
      - name: Verify database code tables
        run: node database/tests/code-table-parity.mjs
      - name: Verify runtime contracts
        run: npm run check:runtime-contract
      - name: Verify repository data authority
        run: |
          npm run check:data-authority
          npm run test:checks
      - name: Verify documentation and ticket indexes
        run: |
          npm run check:docs
          npm run check:tickets
      - name: Verify generated tool adapters
        run: npm run check:adapters
      - name: Verify evidence and reviewed images
        run: |
          npm run check:evidence
          npm run check:image-review
      - name: Scan decoded documents and messages
        run: npm run check:binary-content
      - name: Verify source size and repository inventory
        run: |
          npm run check:layout
          npm run check:production-dependencies
          npm run check:source-size
          npm run check:inventory
          npm run check:reconciliation
          npm run check:tree
          npm run inventory:checkout
          npm run check:line-endings
      - name: Reject tracked build output
        run: npm run check:outputs
      - name: Reject forbidden terminology and artifacts
        run: npm run check:forbidden
      - name: Publish repository audit ledgers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-audit-ledgers
          path: .artifacts/audit/*.json
          if-no-files-found: error

  verify-live:
    name: Verify live registry drift (gated)
    runs-on: ubuntu-latest
    needs: [changes, typescript, hygiene]
    env:
      HAVE_AZURE: ${{ secrets.AZURE_CREDENTIALS != '' }}
    if: ${{ needs.changes.outputs.code != 'false' && needs.typescript.result == 'success' && needs.hygiene.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip notice
        if: env.HAVE_AZURE != 'true'
        run: echo "AZURE_CREDENTIALS is not configured; live registry-drift verification is skipped."
      - uses: actions/setup-node@v4
        if: env.HAVE_AZURE == 'true'
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        if: env.HAVE_AZURE == 'true'
        run: npm ci
      - name: Azure login
        if: env.HAVE_AZURE == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Verify LIVE_FACTS.json against Azure (read-only, fails closed)
        if: env.HAVE_AZURE == 'true'
        run: node scripts/checks/live-facts-azure-compare.mjs
