<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Collision Engineers — Independent Automotive Engineering Experts</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: var(--font-web);
    color: #1a1a1a;
    background: #fff;
    -webkit-font-smoothing: antialiased;
  }
  a { -webkit-tap-highlight-color: transparent; }
  @keyframes cePing { 75%, 100% { transform: scale(2); opacity: 0; } }

  /* Responsive */
  .ce-mobile-btn { display: none; }
  @media (max-width: 880px) {
    .ce-desktop-nav { display: none !important; }
    .ce-mobile-btn { display: inline-flex !important; }
    .ce-hero-grid, .ce-about-grid, .ce-contact-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .ce-hero-img { display: none; }
    .ce-hero-h1 { font-size: 40px !important; }
    .ce-trust-grid { grid-template-columns: 1fr 1fr !important; }
    .ce-services-grid, .ce-diff-grid { grid-template-columns: 1fr !important; }
    .ce-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
    .ce-hero-cta { flex-direction: column !important; }
  }
  @media (min-width: 881px) { .ce-mobile-menu { display: none !important; } }
</style>
</head>
<body id="top">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="site-parts-a.jsx"></script>
  <script type="text/babel" src="site-parts-b.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <React.Fragment>
          <Header />
          <main>
            <Hero />
            <TrustBar />
            <ServicesSection />
            <AboutSection />
            <DifferenceSection />
            <CTABand />
            <ContactSection />
          </main>
          <Footer />
          <WhatsAppButton />
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
