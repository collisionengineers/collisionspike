<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .wbtn { font-family:var(--font-web); font-weight:600; font-size:14px; border-radius:2px; border:0; cursor:pointer; display:inline-flex; align-items:center; gap:8px; padding:13px 26px; }
  .wbtn.solid { background:var(--ce-red); color:#fff; }
  .wbtn.ghost { background:#fff; color:var(--ce-fg,#1a1a1a); border:1px solid var(--web-border); }
  .wbtn.onred { background:#fff; color:var(--ce-red); }
  .wbtn.split { padding:10px 24px; text-align:left; align-items:center; justify-content:space-between; min-width:230px; }
  .wbtn.split .sm { font-size:13px; font-weight:500; display:block; margin-top:-2px; }
  .arr { width:18px;height:18px; }
</style></head>
<body>
  <div class="col">
    <div class="cap">Website buttons — sharp 2px, red &amp; ghost</div>
    <div class="spread">
      <button class="wbtn solid">Request a Report <svg class="arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
      <button class="wbtn ghost">View Services <svg class="arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg></button>
    </div>
    <div class="spread">
      <button class="wbtn split solid"><span><strong style="font-size:15px;font-weight:800;">Request</strong><span class="sm">Engineering Report</span></span><svg class="arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg></button>
      <button class="wbtn onred">Contact Us</button>
    </div>
  </div>
</body></html>
