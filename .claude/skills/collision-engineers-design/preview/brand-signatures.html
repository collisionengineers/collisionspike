<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .sigs { display:flex; gap:26px; flex-wrap:wrap; }
  .sig { display:flex; flex-direction:column; gap:4px; font-family:Arial,Helvetica,sans-serif; }
  .sig img { height:48px; width:auto; max-width:200px; object-fit:contain; object-position:left; }
  .sig .nm { font-size:13px; font-weight:700; color:#222; }
  .sig .rl { font-size:11px; color:#6b6b6b; }
</style></head>
<body>
  <div class="col" style="gap:10px;">
    <div class="cap">Engineer signatures — transparent PNG, for signed reports</div>
    <div class="sigs">
      <div class="sig"><img src="../assets/signatures/ed_mawdsley.png" alt=""><span class="nm">E. Mawdsley</span><span class="rl">Independent Automotive Engineer</span></div>
      <div class="sig"><img src="../assets/signatures/neil_oreilly.png" alt=""><span class="nm">N. D. O'Reilly</span><span class="rl">Independent Automotive Engineer</span></div>
      <div class="sig"><img src="../assets/signatures/andy_patterson.png" alt=""><span class="nm">A. Patterson</span><span class="rl">Independent Automotive Engineer</span></div>
    </div>
  </div>
</body></html>
