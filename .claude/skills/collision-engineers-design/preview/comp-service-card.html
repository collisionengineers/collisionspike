<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  body { background:var(--ce-charcoal); }
  .card { background:#2c2a27; border:1px solid rgba(255,255,255,.1); border-radius:2px; padding:26px; max-width:320px; font-family:var(--font-web); }
  .chip { width:44px;height:44px; background:var(--ce-red); border-radius:2px; display:flex; align-items:center; justify-content:center; margin-bottom:18px; }
  .chip svg { width:20px;height:20px;color:#fff; }
  .card h3 { color:#fff; font-size:18px; font-weight:700; margin:0 0 12px; }
  .card p { color:rgba(255,255,255,.6); font-size:14px; line-height:1.6; margin:0 0 18px; }
  .card li { color:rgba(255,255,255,.55); font-size:12px; list-style:none; display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .card li::before { content:""; width:4px;height:4px;border-radius:999px;background:var(--ce-red); }
  ul { margin:0; padding:0; }
</style></head>
<body>
  <div class="card">
    <div class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg></div>
    <h3>Accident Damage Reports</h3>
    <p>Court-compliant reports with lightning speed — physical and desktop inspections.</p>
    <ul><li>Physical inspections</li><li>Desktop inspections</li><li>Court-compliant format</li></ul>
  </div>
</body></html>
