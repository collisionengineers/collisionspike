<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  body { font-family:Arial,Helvetica,sans-serif; }
  .sec-h { font-size:14px; font-weight:700; text-transform:uppercase; color:#222; margin:0 0 10px; border-bottom:2px solid #c80a32; padding-bottom:4px; }
  .vbox { width:100%; border-collapse:collapse; border:1px solid #bebebe; }
  .vbox td { border:1px solid #bebebe; padding:12px 16px; font-weight:700; font-size:13.5px; }
  .vbox td.l { background:#f2f2f2; width:62%; }
  .vbox td.n { color:#c80a32; font-size:19px; text-align:center; }
</style></head>
<body>
  <div class="col" style="gap:14px;">
    <div>
      <div class="cap" style="margin-bottom:8px;">Section heading — red rule beneath</div>
      <div class="sec-h">Assessed Retail Market Value</div>
    </div>
    <div>
      <div class="cap" style="margin-bottom:8px;">Value box — figure in brand red</div>
      <table class="vbox"><tbody><tr><td class="l">Engineer's assessed retail value</td><td class="n">£1,200.00</td></tr></tbody></table>
    </div>
  </div>
</body></html>
