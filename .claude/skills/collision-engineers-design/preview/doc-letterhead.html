<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .lh { display:flex; align-items:flex-start; justify-content:space-between; gap:24px; font-family:Arial,Helvetica,sans-serif; }
  .lh img { height:64px; }
  .ref { display:grid; grid-template-columns:auto auto; gap:3px 12px; font-size:12px; }
  .ref .l { font-weight:700; text-align:right; }
  .ref .v { color:#444; }
  .t { text-align:center; font-size:14px; font-weight:700; text-transform:uppercase; text-decoration:underline; text-underline-offset:3px; margin:14px 0 8px; font-family:Arial,sans-serif; }
  .re { color:var(--ce-red); font-weight:700; font-size:12px; font-family:Arial,sans-serif; }
  .re .r { color:#1a1a1a; font-weight:400; }
</style></head>
<body>
  <div class="col" style="gap:6px;">
    <div class="lh">
      <img src="../assets/logo_no_margin.png" alt="">
      <div class="ref"><span class="l">Our Ref:</span><span class="v">fh70 pky</span><span class="l">Your Ref:</span><span class="v">FH70 PKY</span><span class="l">Date:</span><span class="v">07/05/2026</span></div>
    </div>
    <div class="t">Total Loss Report</div>
    <div class="re">RE: Road Traffic Accident: <span class="r">Daniel Kelly — 04/05/2026</span></div>
  </div>
</body></html>
